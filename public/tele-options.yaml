# ─── STT Providers ──────────────────────────────────────

stt_providers:
  - { id: deepgram, name: "Deepgram (Default)" }
  - { id: openai, name: "OpenAI Whisper" }
  - { id: assemblyai, name: "AssemblyAI" }

# ─── Avatar Providers ───────────────────────────────────

avatar_providers:
  - { id: liveavatar, name: "LiveAvatar (Active)" }
  - { id: hedra, name: "Hedra (Coming soon)" }
  - { id: tavus, name: "Tavus (Coming soon)" }

# ─── Enum Values ────────────────────────────────────────

enums:
  brainMode:
    - ONE_BRAIN    # Voice agent LLM generates scenes directly
    - TWO_BRAIN    # Separate UI Engine generates scenes (default)

  toolAnnouncementMode:
    - SILENT       # No output when tools are called
    - SPEECH       # Agent announces tool calls (default)

  uiEngineKnowledgeMode:
    - SEARCH       # search_knowledge tool per request (default, handles large KBs)
    - CONTEXT      # Load all KB content into context window (fast, limited size)

  widgetPosition:
    - bottom-right # Default
    - bottom-left
    - top-right
    - top-left

  mcpTransportType:
    - HTTP          # Streamable HTTP (most common for remote servers)
    - SSE           # Server-Sent Events
    - STDIO         # Local process (command + args)

# ─── MCP Server Fields ─────────────────────────────────
# Servers listed in tele.yaml are auto-created if they don't exist.
# Sensitive fields (headers, env vars) must be set in the dashboard.

mcp_server_fields:
  name: "Required. Server name (must be unique per client)."
  description: "Optional. Human-readable description."
  transportType: "Required for auto-creation. HTTP | SSE | STDIO."
  url: "HTTP/SSE only. The MCP server endpoint URL."
  headers: "HTTP/SSE only. Auth headers as key-value pairs (e.g. Authorization: Bearer ...)."
  command: "STDIO only. The command to run (e.g. 'npx', 'python')."
  args: "STDIO only. Array of arguments (e.g. ['-y', 'my-server'])."
  env: "STDIO only. Environment variables as key-value pairs (e.g. API_KEY: sk-...)."
  cwd: "STDIO only. Working directory for the command."
  allowedTools: "Optional. Array of tool names to expose (null = all tools)."

# ─── UI Engine Models ───────────────────────────────────

ui_engine_models:
  - { id: gpt-4.1-nano, name: "GPT-4.1 Nano (Default, fastest)" }
  - { id: gpt-4o-mini, name: "GPT-4o Mini" }
  - { id: gpt-4o, name: "GPT-4o" }

# ─── Realtime Voices ────────────────────────────────────
# Only used when agent.llm.model is a gpt-realtime-* model.
# Set agent.voice.voiceId to one of these values.

realtime_voices:
  - alloy
  - ash
  - ballad
  - cedar
  - coral
  - echo
  - marin        # Default for Realtime models
  - sage
  - shimmer
  - verse

