# tele.yaml — Mobeus Voice AI Configuration
# This file controls your site's voice agent settings.
# Changes pushed to your repo will auto-apply to your dashboard.
# See public/tele-options.yaml for all valid provider/model values.
#
# Docs: https://docs.mobeus.ai/tele-yaml

version: 1
site:
  name: Employer-II
  active: true
widget:
  position: bottom-right
  primaryColor: '#000000'
defaults:
  avatarEnabled: false
  avatarVisible: true
  micMuted: false
  volumeMuted: false
agent:
  llm:
    provider: openai
    model: gpt-4o
    temperature: 0.7
  voice:
    provider: elevenlabs
  stt:
    provider: deepgram
    language: en
  vad:
    provider: silero
  behavior:
    allowInterruptions: true
    interruptionThreshold: 0.5
  avatar:
    enabled: false
    provider: liveavatar
sceneGeneration:
  brainMode: ONE_BRAIN
  uiEngine:
    enabled: false
    knowledgeMode: SEARCH
  contextSharing:
    shareVoiceContext: true
    shareSceneContext: true
toolAnnouncement:
  mode: SPEECH
prompts:
  speakLlm: public/prompts/speak-llm-system-prompt.md
  showLlm: public/prompts/show-llm-system-prompt.md
mcpServers:
  - name: MCP Server
    description: trAIn MCP Servers
    transportType: SSE
    url: https://train-v1.rapidprototype.ai/mcp/sse
paths:
  siteFunctions: src/site-functions/register.ts
  teleComponents: src/components/tele-components/component-registry.ts
_info:
  siteUrl: https://53wyntkt.sites.mobeus.ai
  subdomain: 53wyntkt
  githubRepo: debasishsatapathy-ghost/employer-ii-site
